    <div class="row g-5">



      <article class="blog-post">
      
        <header>
          <h1 style="margin-top: 12px; ">
              {{ .Title }}
          </h1>
        </header>
        
        {{ if eq .Title "最近发布"}}
       {{ partial "recent/single-published.html" . }}
        {{ else if eq .Title "最近更新" }}
        {{ partial "recent/single-updated.html" . }}
        {{ end }}
      </article>
 


    </div>
