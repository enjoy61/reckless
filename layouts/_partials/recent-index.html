<div class="container">
    <div class="card text-center border-info">
        
        <div class="card-header bg-transparent border-info">
            <ul class="nav nav-tabs card-header-tabs">
            <li class="nav-item">  
                <a class="nav-link active" id="published-tab"  data-bs-toggle="tab" aria-current="true" data-bs-target="#published-pane" aria-controls="published-pane">最近发布</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="updated-tab" data-bs-toggle="tab" data-bs-target="#updated-pane" aria-controls="updated-pane">最近更新</a>
            </li>
            </ul>
        </div>

        <div class="card-body">
            <div class="tab-content">
                <div class="tab-pane fade show active" id="published-pane" aria-labelledby="published-tab" tabindex="0">
                    {{ partial "recent/index-published.html" . }}
                </div> 
                <div class="tab-pane fade" id="updated-pane" aria-labelledby="updated-tab" tabindex="0">
                    {{ partial "recent/index-updated.html" . }}
                </div>
            </div>
        </div>

    </div>
</div>
